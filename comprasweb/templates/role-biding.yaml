apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.namespace }}-rbac
  namespace: {{ .Values.namespace }}
subjects:
- kind: ServiceAccount
  name: "{{ .Values.namespace }}-account"
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
